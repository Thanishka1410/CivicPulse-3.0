<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CivicPulse</title>
  <style>
    body {
      margin: 0;
      background-color: #fff;
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      flex-direction: column;
    }

    .logo-icon {
      width: 140px;
      height: 140px;
      margin-bottom: 20px;
    }

    .logo-text {
      font-size: 48px;
      font-weight: bold;
      background: linear-gradient(to right, #111f2f, #130417);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
  </style>
</head>
<body>
  <!-- Logo Icon -->
  <svg class="logo-icon" viewBox="0 0 100 100">
    <defs>
      <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#132c3c" />
        <stop offset="100%" stop-color="#132c3c" />
      </linearGradient>
    </defs>
    <path d="M50,5 C70,5 85,20 85,40 C85,65 50,95 50,95 C50,95 15,65 15,40 C15,20 30,5 50,5 Z" fill="url(#gradient)" />
    <path d="M30,45 L40,45 L43,35 L47,65 L52,45 L57,45 L60,50 L70,35" stroke="white" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round" />
  </svg>

  <!-- Logo Text -->
  <h1 class="logo-text">CivicPulse</h1>

  <script>
    setTimeout(() => {
      window.location.href = "civicpulse.html";
    }, 1000);
  </script>
</body>
</html>
